<!DOCTYPE html>
<html>
<head>
    <title>Spam Email Detector</title>
</head>
<body style="text-align:center; font-family:Showcard Gothic;">

    <h1>Email Spam Detector</h1>

    <form action="/predict" method="post">
        <textarea name="email" rows="6" cols="50" placeholder="Enter email text here"></textarea><br><br>
        <input type="submit" value="Check">
    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
